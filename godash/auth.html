<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register | GoDash</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/darkmode.css">
    <link rel="stylesheet" href="css/forms.css">
    <script src="js/app.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/darkmode.js" defer></script>
    <style>
        .auth-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .auth-toggle button {
            background: none;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            padding-bottom: 5px;
            color: #666;
        }
        .auth-toggle button.active {
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
        }
        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <a href="index.html" style="text-decoration: none;"><h1>GoDash</h1></a>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <div class="dropdown">
                <button class="dropbtn">Products</button>
                <div class="dropdown-content">
                    <a href="products.html?category=smartphones">Electronics</a>
                    <a href="products.html?category=mens-shirts">Clothing</a>
                    <a href="products.html?category=womens-watches">Watches</a>
                    <a href="products.html?category=fragrances">Perfumes</a>
                    <a href="products.html?category=automotive">Automotive</a>
                    <a href="products.html?category=groceries">Pet Supplies</a>
                    <a href="products.html?category=sports-accessories">Sports</a>
                </div>
            </div>
            <a href="best-sellers.html">Best Sellers</a>
            <a href="trending.html">Trending Deals</a>
            <a href="refund.html">Claim Refund</a>
            <a href="about.html">About Us</a>
            <a href="about.html#contact">Contact Us</a>
            <a href="cart.html" class="cart-link">
                Cart (<span id="cart-count">0</span>)
            </a>
        </nav>
        <button id="dark-mode-toggle">Dark Mode</button>
    </header>

    <main class="form-container">
        <section class="auth-section">
            <div class="auth-toggle">
                <button id="login-toggle" class="active">Login</button>
                <button id="register-toggle">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>

            <!-- REGISTER FORM -->
            <form id="register-form" class="hidden">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" required placeholder="johndoe">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-btn">Register</button>
            </form>

            <div id="auth-message" class="hidden"></div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <div>
                <h3>GoDash</h3>
                <p>Modern ecommerce platform with smart delivery features.</p>
            </div>
            <div class="footer-links">
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="refund.html">Refund</a>
                <a href="feedback.html">Feedback</a>
                <a href="faq.html">FAQ</a>
            </div>
        </div>
    </footer>

</body>

</html>
