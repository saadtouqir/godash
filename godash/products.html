<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products | GoDash</title>
    <meta name="description" content="Browse our full catalog of electronics, clothing, watches, and more.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/darkmode.css">
    <script src="js/app.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/darkmode.js" defer></script>
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <a href="index.html" style="text-decoration: none;"><h1>GoDash</h1></a>
        </div>
        <nav class="navbar">
            <a href="index.html">Home</a>
            <div class="dropdown">
                <button class="dropbtn">Products</button>
                <div class="dropdown-content">
                    <a href="products.html?category=smartphones">Electronics</a>
                    <a href="products.html?category=mens-shirts">Clothing</a>
                    <a href="products.html?category=womens-watches">Watches</a>
                    <a href="products.html?category=fragrances">Perfumes</a>
                    <a href="products.html?category=automotive">Automotive</a>
                    <a href="products.html?category=groceries">Pet Supplies</a>
                    <a href="products.html?category=sports-accessories">Sports</a>
                </div>
            </div>
            <a href="best-sellers.html">Best Sellers</a>
            <a href="trending.html">Trending Deals</a>
            <a href="refund.html">Claim Refund</a>
            <a href="about.html">About Us</a>
            <a href="about.html#contact">Contact Us</a>
            <a href="cart.html" class="cart-link">
                Cart (<span id="cart-count">0</span>)
            </a>
        </nav>
        <button id="dark-mode-toggle">Dark Mode</button>
    </header>

    <main>
        <!-- SEARCH & FILTER SECTION -->
        <section class="search-section">
            <div class="section-header">
                <h2 id="category-title">All Products</h2>
            </div>
            <input
                type="text"
                id="search-input"
                placeholder="Search in this category..."
                aria-label="Search Products">
        </section>

        <!-- PRODUCTS GRID -->
        <section class="products-section">
            <div id="products-container" class="products-grid">
                <p>Loading products...</p>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <div>
                <h3>GoDash</h3>
                <p>Modern ecommerce platform with smart delivery features.</p>
            </div>
            <div class="footer-links">
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
                <a href="feedback.html">Feedback</a>
                <a href="faq.html">FAQ</a>
            </div>
        </div>
    </footer>

</body>

</html>
